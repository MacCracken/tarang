name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [ci]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-amd64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-amd64
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux system deps
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm

      - name: Install cross-compilation deps (Linux arm64)
        if: matrix.name == 'linux-arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      # macOS — install Homebrew FFI codec deps and build with portable features
      - name: Install codec dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install dav1d libvpx opus fdk-aac nasm

      - name: Build release (Linux amd64)
        if: matrix.name == 'linux-amd64'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (Linux arm64 — vendored codecs only)
        if: matrix.name == 'linux-arm64'
        run: cargo build --release --target ${{ matrix.target }} --features openh264,openh264-enc,rav1e,hwaccel

      - name: Build release (macOS — portable features)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }} --features portable

      - name: Build release (Windows — default features)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      # Package
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          ARCHIVE="tarang-${VERSION}-${{ matrix.name }}.tar.gz"
          tar czf "${ARCHIVE}" -C target/${{ matrix.target }}/release tarang
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256" || shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = (Get-Content VERSION).Trim()
          $ARCHIVE = "tarang-${VERSION}-${{ matrix.name }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/tarang.exe" -DestinationPath $ARCHIVE
          $hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "${ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tarang-${{ matrix.name }}
          path: |
            tarang-*.tar.gz
            tarang-*.zip
            tarang-*.sha256

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [ci, build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci, build, publish]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tarang-*.tar.gz
            tarang-*.zip
            tarang-*.sha256
          generate_release_notes: true
