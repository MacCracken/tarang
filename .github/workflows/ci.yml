name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Type check (no features)
        run: cargo check
      - name: Type check (all features)
        run: cargo check --features full

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit
        run: cargo audit

  deny:
    name: Supply Chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  vet:
    name: Supply Chain (cargo-vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-vet
        run: cargo install cargo-vet
      - name: Vet
        run: cargo vet

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Run tests
        run: cargo test
      - name: Run tests with codec features
        run: cargo test --features openh264,openh264-enc,vpx,vpx-enc,dav1d,vaapi
      - name: Run tests with portable features
        run: cargo test --features portable

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev
      - name: Build docs (warnings as errors)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps
      - name: Verify required files exist
        run: |
          for file in README.md LICENSE CHANGELOG.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md VERSION; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file $file is missing"
              exit 1
            fi
          done
          echo "All required documentation files present"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Coverage summary
        run: cargo llvm-cov --summary-only | tail -5
      - name: Verify minimum coverage (89%)
        run: |
          COVERAGE=$(cargo llvm-cov --summary-only 2>&1 | grep "^TOTAL" | awk '{print $10}' | sed 's/%//')
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 89" | bc -l) )); then
            echo "ERROR: Coverage ${COVERAGE}% is below 89% threshold"
            exit 1
          fi
      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  fuzz:
    name: Fuzz Testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz fuzz_wav
        run: cargo +nightly fuzz run fuzz_wav -- -max_total_time=60 -max_len=65536
      - name: Fuzz fuzz_mp4
        run: cargo +nightly fuzz run fuzz_mp4 -- -max_total_time=60 -max_len=65536
      - name: Fuzz fuzz_mkv
        run: cargo +nightly fuzz run fuzz_mkv -- -max_total_time=60 -max_len=65536
      - name: Fuzz fuzz_ogg
        run: cargo +nightly fuzz run fuzz_ogg -- -max_total_time=60 -max_len=65536

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Run benchmarks
        run: cargo bench -- --output-format=bencher 2>&1 | tee bench-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results.txt

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install codec dependencies via Homebrew
        run: brew install dav1d libvpx opus fdk-aac nasm
      - name: Check (default features)
        run: cargo check
      - name: Test (default features)
        run: cargo test
      - name: Check (portable features)
        run: cargo check --features portable
      - name: Test (portable features)
        run: cargo test --features portable

  downstream:
    name: Downstream Consumers
    runs-on: ubuntu-latest
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        repo: [jalwa, tazama, shruti]
    steps:
      - uses: actions/checkout@v4
        with:
          path: tarang
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/${{ matrix.repo }}
          path: ${{ matrix.repo }}
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Check if downstream repo was cloned
        id: check-repo
        run: |
          if [ -f "${{ matrix.repo }}/Cargo.toml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Patch tarang dependency to local
        if: steps.check-repo.outputs.exists == 'true'
        working-directory: ${{ matrix.repo }}
        run: |
          # Override tarang dependency to use local checkout
          echo '[patch.crates-io]' >> Cargo.toml
          echo 'tarang = { path = "../tarang" }' >> Cargo.toml
      - name: Build downstream consumer
        if: steps.check-repo.outputs.exists == 'true'
        working-directory: ${{ matrix.repo }}
        run: cargo check

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install NASM
        run: choco install nasm -y
      - name: Check (default features)
        run: cargo check
      - name: Test (default features)
        run: cargo test
      - name: Check (vendored codecs)
        run: cargo check --features openh264,openh264-enc,rav1e,hwaccel
      - name: Test (vendored codecs)
        run: cargo test --features openh264,openh264-enc,rav1e,hwaccel

  semver:
    name: SemVer Check
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev nasm
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks
      - name: Check SemVer compliance
        run: cargo semver-checks check-release --default-features

  build:
    name: Build Release
    needs: [check, test, security, deny, vet]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev libdav1d-dev libva-dev libopus-dev libfdk-aac-dev
      - name: Build release binary
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tarang-linux-amd64
          path: target/release/tarang
