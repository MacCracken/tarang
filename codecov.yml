# Codecov configuration
# https://docs.codecov.io/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 2%
    patch:
      default:
        target: 80%

ignore:
  - "fuzz/**"
  - "benches/**"
  - "examples/**"
  - "tests/**"
  - "patches/**"
  - "src/mcp/**"    # stdio JSON-RPC — e2e only, not unit-testable
  - "src/main.rs"   # CLI entry point — tested via integration tests
